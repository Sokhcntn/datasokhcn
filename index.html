<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theo dõi nhiệm vụ | Quản lý tiến độ</title>

  <!-- Font & CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Thư viện xử lý file -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>

  <!-- Google API & Chart.js -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f4f7fc; }
    tbody tr:nth-child(even) { background-color: #f9fafb; }
    tbody tr:hover { background-color: #f3f4f6; transition: 0.2s; }
  </style>
</head>

<body class="antialiased">
<div class="max-w-[1600px] mx-auto px-4 md:px-6 py-6 md:py-8">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold text-slate-800 flex items-center gap-3">
        <i class="fas fa-tasks text-blue-600 text-3xl"></i>
        Theo dõi nhiệm vụ
      </h1>
      <p class="text-slate-500 mt-1 text-sm">Nhập liệu trực tiếp | Import Excel/Word cùng cấu trúc</p>
    </div>
    <div class="flex flex-wrap gap-3">
      <button id="authorize_button" class="bg-blue-600 text-white px-4 py-2 rounded">Đăng nhập Google</button>
      <button id="signout_button" class="bg-gray-600 text-white px-4 py-2 rounded hidden">Đăng xuất</button>
    </div>
  </div>

  <!-- Bảng nhiệm vụ -->
  <div class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
    <div class="overflow-x-auto task-table">
      <table class="min-w-[1400px] w-full text-sm">
        <thead class="bg-slate-100 border-b-2">
          <tr>
            <th class="px-4 py-3">STT</th>
            <th class="px-4 py-3">Nhiệm vụ</th>
            <th class="px-4 py-3">Chủ trì</th>
            <th class="px-4 py-3">Hạn</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Biểu đồ -->
  <h3 class="mt-6 font-semibold">Biểu đồ đường (xu hướng nhiệm vụ)</h3>
  <canvas id="lineChart" width="600" height="400"></canvas>

  <h3 class="mt-6 font-semibold">Biểu đồ tròn (phân bổ nhiệm vụ)</h3>
  <canvas id="pieChart" width="600" height="400"></canvas>
</div>

<script>
  const CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com";
  const API_KEY = "YOUR_API_KEY";
const DISCOVERY_DOCS = ["https://sheets.googleapis.com/$discovery/rest?version=v4"];
  const SCOPES = "https://www.googleapis.com/auth/spreadsheets";
  const sheetId = "YOUR_SHEET_ID";
  const range = "Sheet1!A:C";

  let chartLine, chartPie;

  function handleClientLoad() {
    gapi.load("client:auth2", initClient);
  }

  function initClient() {
    gapi.client.init({
      apiKey: API_KEY,
      clientId: CLIENT_ID,
      discoveryDocs: DISCOVERY_DOCS,
      scope: SCOPES
    }).then(() => {
      let authInstance = gapi.auth2.getAuthInstance();
      authInstance.isSignedIn.listen(updateSigninStatus);
      updateSigninStatus(authInstance.isSignedIn.get());
      document.getElementById("authorize_button").onclick = () => authInstance.signIn();
      document.getElementById("signout_button").onclick = () => authInstance.signOut();
    });
  }

  function updateSigninStatus(isSignedIn) {
    if (isSignedIn) {
      document.getElementById("authorize_button").style.display = "none";
      document.getElementById("signout_button").style.display = "block";
      loadSheetData();
      setInterval(loadSheetData, 5000);
    } else {
      document.getElementById("authorize_button").style.display = "block";
      document.getElementById("signout_button").style.display = "none";
    }
  }

  async function loadSheetData() {
    const response = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: sheetId,
      range: range
    });
    const data = response.result;

    const tbody = document.getElementById("taskTableBody");
    tbody.innerHTML = "";

    if (data.values) {
      const labels = [];
      const values = [];

      for (let i = 1; i < data.values.length; i++) {
        const row = data.values[i];
        const stt = i;
        const nhiemVu = row[0];
        const chuTri = row[1];
        const han = row[2];
        tbody.innerHTML += `<tr><td>${stt}</td><td>${nhiemVu}</td><td>${chuTri}</td><td>${han}</td></tr>`;
        labels.push(nhiemVu);
        values.push(Number(chuTri.length)); // ví dụ: số ký tự để demo
      }

      // Biểu đồ đường
      if (!chartLine) {
        const ctxLine = document.getElementById("lineChart").getContext("2d");
        chartLine = new Chart(ctxLine, {
          type: "line",
          data: { labels, datasets: [{ label: "Xu hướng", data: values, borderColor: "blue", fill: false }] }
        });
      } else {
        chartLine.data.labels = labels;
        chartLine.data.datasets[0].data = values;
        chartLine.update();
      }

      // Biểu đồ tròn
      if (!chartPie) {
        const ctxPie = document.getElementById("pieChart").getContext("2d");
        chartPie = new Chart(ctxPie, {
          type: "pie",
          data: { labels, datasets: [{ data: values, backgroundColor: ["red","blue","green","orange","purple","cyan"] }] }
        });
      } else {
        chartPie.data.labels = labels;
        chartPie.data.datasets[0].data = values;
chartPie.update();
      }
    }
  }

  handleClientLoad();
</script>
</body>
</html>
